name: Release

# Push a version tag (e.g. v1.0.0) to build the release artifacts and attach them
# to the matching GitHub Release. "Run workflow" from the Actions tab builds the
# artifacts too (downloadable from the run) without publishing a release.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # allow the workflow to create/update the GitHub Release

jobs:
  # ---------------------------------------------------------------- Windows .exe
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish single-file exe
        shell: pwsh
        run: |
          dotnet publish src/CoffinTranslate/CoffinTranslate.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none -p:DebugSymbols=false -o publish
          Copy-Item publish/CoffinTranslate.exe CoffinTranslate-win-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CoffinTranslate-win-x64.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CoffinTranslate-win-x64.exe

  # ------------------------------------------------- Linux AppImage + .deb package
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish single-file binary
        run: |
          dotnet publish src/CoffinTranslate/CoffinTranslate.csproj -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false -o publish

      - name: Prepare 256px icon
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert src/CoffinTranslate/Assets/CoffinTranslate-IconV2.png -resize 256x256 coffintranslate.png

      - name: Version from tag
        id: ver
        run: |
          V="${GITHUB_REF_NAME#v}"
          case "$V" in ''|*[!0-9.]*) V="1.0.0";; esac
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp publish/CoffinTranslate AppDir/usr/bin/CoffinTranslate
          chmod +x AppDir/usr/bin/CoffinTranslate
          cp coffintranslate.png AppDir/usr/share/icons/hicolor/256x256/apps/coffintranslate.png
          cp coffintranslate.png AppDir/coffintranslate.png
          printf '%s\n' \
            '[Desktop Entry]' 'Type=Application' 'Name=CoffinTranslate' \
            'Comment=Translation manager for The Coffin of Andy and Leyley' \
            'Exec=CoffinTranslate' 'Icon=coffintranslate' 'Categories=Utility;' 'Terminal=false' \
            > AppDir/coffintranslate.desktop
          cp AppDir/coffintranslate.desktop AppDir/usr/share/applications/coffintranslate.desktop
          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/CoffinTranslate" "$@"' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir CoffinTranslate-x86_64.AppImage

      - name: Build .deb
        run: |
          PKG=deb
          mkdir -p $PKG/DEBIAN $PKG/usr/bin $PKG/usr/share/applications $PKG/usr/share/icons/hicolor/256x256/apps
          cp publish/CoffinTranslate $PKG/usr/bin/coffintranslate
          chmod +x $PKG/usr/bin/coffintranslate
          cp coffintranslate.png $PKG/usr/share/icons/hicolor/256x256/apps/coffintranslate.png
          printf '%s\n' \
            '[Desktop Entry]' 'Type=Application' 'Name=CoffinTranslate' \
            'Comment=Translation manager for The Coffin of Andy and Leyley' \
            'Exec=coffintranslate' 'Icon=coffintranslate' 'Categories=Utility;' 'Terminal=false' \
            > $PKG/usr/share/applications/coffintranslate.desktop
          printf '%s\n' \
            'Package: coffintranslate' \
            "Version: ${{ steps.ver.outputs.version }}" \
            'Section: utils' 'Priority: optional' 'Architecture: amd64' \
            'Maintainer: NMWplays' \
            'Depends: libc6, libfontconfig1' \
            'Description: Translation manager for The Coffin of Andy and Leyley' \
            ' Unofficial fan tool to install and edit translations.' \
            > $PKG/DEBIAN/control
          dpkg-deb --build --root-owner-group $PKG CoffinTranslate-amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            CoffinTranslate-x86_64.AppImage
            CoffinTranslate-amd64.deb

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CoffinTranslate-x86_64.AppImage
            CoffinTranslate-amd64.deb
